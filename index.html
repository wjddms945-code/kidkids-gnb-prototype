<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>키드키즈 GNB 리디자인 시안</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f6f7f8;
      color: #1f2933;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 32px;
    }

    .eyebrow {
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 700;
      color: #2a8a4a;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.25;
      letter-spacing: -0.8px;
    }

    .desc {
      margin: 0 0 40px;
      color: #667085;
      font-size: 16px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      display: block;
      min-height: 150px;
      padding: 24px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      transition: 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #2a8a4a;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.1);
    }

    .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      margin-bottom: 18px;
      border-radius: 14px;
      background: #e8f7ee;
      color: #1e6e3c;
      font-weight: 800;
    }

    .title {
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 800;
    }

    .text {
      color: #667085;
      font-size: 14px;
      line-height: 1.5;
    }

    .note {
      margin-top: 32px;
      color: #98a2b3;
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .wrap { padding: 48px 20px; }
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">KIDKIDS GNB REDESIGN</div>
    <h1>키드키즈 GNB 리디자인 시안</h1>
    <p class="desc">
      GNB 구조 개편 방향을 비교하기 위한 프로토타입입니다.<br>
      확인할 시안을 선택해 주세요.
    </p>

    <section class="grid">
      <a class="card" href="./gnb1/index.html">
        <div class="num">01</div>
        <div class="title">GNB 1안</div>
        <div class="text">기존 등록 시안. 메가메뉴 중심 구조.</div>
      </a>

      <a class="card" href="./gnb2/index.html">
        <div class="num">02</div>
        <div class="title">GNB 2안</div>
        <div class="text">신규 시안. 제작 예정.</div>
      </a>

      <a class="card" href="./gnb3/index.html">
        <div class="num">03</div>
        <div class="title">GNB 3안</div>
        <div class="text">신규 시안. 제작 예정.</div>
      </a>

      <a class="card" href="./gnb4/index.html">
        <div class="num">04</div>
        <div class="title">GNB 4안</div>
        <div class="text">추가 확장 시안. 제작 예정.</div>
      </a>
    </section>

    <p class="note">※ 각 시안은 독립 HTML 페이지로 관리됩니다.</p>
  </main>
</body>
</html>
